<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKENPÔ THE FINAL GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>JOKENPÔ THE FINAL GAME</h1>
        
        <div class="score-board">
            <div class="score-item">
                <span class="label">Vitórias</span>
                <span id="wins" class="number">0</span>
            </div>
            <div class="score-item">
                <span class="label">Derrotas</span>
                <span id="losses" class="number">0</span>
            </div>
        </div>

        <div class="choices">
            <button onclick="play('pedra')">🪨 </button>
            <button onclick="play('papel')">📄 </button>
            <button onclick="play('tesoura')">✂️ </button>
        </div>

        <div id="result">
            <p>Faça sua jogada!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
